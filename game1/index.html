<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <title>Skyplate Run</title>
  <link rel='stylesheet' href='./style.css'>
</head>
<body>
  <div class='hud'>
    <h1>Skyplate Run</h1>
    <p id='objective'>Collect every core, ride the moving platforms, and reach the portal at the summit.</p>
    <p><span id='progress'>0 / 8</span> cores collected</p>
    <p id='status' class='status'>Checkpoint: Start Pad</p>
    <p class='hint'>Click to lock the mouse. Use WASD to move, mouse to look, and Space to jump. Cyan pads launch you upward.</p>
  </div>
  <div class='crosshair' aria-hidden='true'></div>
  <canvas id='game'></canvas>
  <script type='module' src='./main.js'></script>
</body>
</html>
